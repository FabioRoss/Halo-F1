name: Build Halo F1

on:
    # commenting out as it doesn't produce usable binaries atm
    #release:
        #types: [published, created, edited]

    # Allows you to run this workflow manually from the Actions tab on any branch
    workflow_dispatch:

jobs:
    compile:
        name: Build (${{ matrix.touch }} touch)
        runs-on: ubuntu-latest

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        strategy:
            fail-fast: false
            matrix:
                include:
                    - touch: capacitive
                      define_touch: true
                    - touch: resistive
                      define_touch: false

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Remove TOUCH_CAPACITIVE define (resistive build)
              if: ${{ matrix.define_touch == false }}
              run: |
                  sed -i 's|^#define TOUCH_CAPACITIVE$|// #define TOUCH_CAPACITIVE|' Halo-F1.ino
            
            - name: Compile sketch
              uses: arduino/compile-sketches@v1
              with:
                  fqbn: "esp32:esp32:esp32s3:PartitionScheme=huge_app,CDCOnBoot=cdc,PSRAM=opi,FlashSize=4M"
                  platforms: |
                      - name: esp32:esp32
                        source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
                        version: 3.3.4
                  libraries: |
                      - name: ArduinoJson
                      - name: WiFiManager
                      - name: lvgl
                        version: 9.3.0
                      - name: bb_spi_lcd
                        version: 2.7.1
                      - name: bb_captouch
                      - name: incbin
                  sketch-paths: |
                      - ./
                  cli-compile-flags: |
                      - --build-property
                      - "compiler.cpp.extra_flags=-DLV_CONF_INCLUDE_SIMPLE -Wa,-I{build.source.path}"
                      - --build-property
                      - "compiler.c.extra_flags=-DLV_CONF_INCLUDE_SIMPLE -Wa,-I{build.source.path}"

            - name: Rename binary
              run: |
                  echo "Searching for compiled binaries..."
                  find . -name "*.merged.bin" -o -name "*.ino.bin" 2>/dev/null | grep -v ".git"

                  FILE=$(find . -name "*.merged.bin" 2>/dev/null | grep -v ".git" | head -1)
                  if [ -z "$FILE" ]; then
                    FILE=$(find . -name "*.ino.bin" 2>/dev/null | grep -v ".git" | grep -v "bootloader\|partitions\|boot_app" | head -1)
                  fi
                  if [ -z "$FILE" ]; then
                    echo "ERROR: No binary found anywhere in workspace"
                    exit 1
                  fi

                  mkdir -p ./build
                  cp "$FILE" ./build/Halo-F1-${{ matrix.touch }}.bin
                  echo "Copied: $FILE -> ./build/Halo-F1-${{ matrix.touch }}.bin"
             
            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: Halo-F1-${{ matrix.touch }}
                  path: ./build/Halo-F1-${{ matrix.touch }}.bin

            - name: Upload to release
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: ./build/Halo-F1-${{ matrix.touch }}.bin



